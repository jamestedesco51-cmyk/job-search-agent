name: Daily Job Digest

on:
  schedule:
    - cron: '0 13 * * *'  # 8am CST (UTC-5) every day
  workflow_dispatch:        # allows you to run it manually from GitHub too

jobs:
  run-job-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 feedparser python-dateutil

      - name: Run job agent
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python3 job_agent.py
